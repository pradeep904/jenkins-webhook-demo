name: Maven Build

on:
  push:
    branches:
      - main

jobs:
  build:

   runs-on: ubuntu-latest

   steps:

     - name: Checkout Repository
       uses: actions/checkout@v4

     - name: Setup Java
       uses: actions/setup-java@v4
       with:
         distribution: temurin
         java-version: '21'
         cache: maven

     - name: Build Project
       run: mvn clean package

     - name: Upload Artifact
       uses: actions/upload-artifact@v4
       with:
         name: app
         path: target/*.jar
